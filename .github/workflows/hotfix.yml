name: 🚨 Hotfix Release

on:
  push:
    branches: 
      - 'hotfix/**'
  workflow_dispatch:
    inputs:
      hotfix_branch:
        description: 'Hotfix branch name'
        required: true
        type: string

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate-hotfix:
    name: 🔍 Validate Hotfix
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Critical tests only
        run: |
          echo "🚨 Running critical tests for hotfix..."
          npm test -- --testPathPattern="critical|security|core"

      - name: 🏗️ Build application
        run: npm run build

      - name: 🔒 Security audit
        run: npm audit --audit-level high

  hotfix-release:
    name: 🚨 Create Hotfix Release
    runs-on: ubuntu-latest
    needs: validate-hotfix
    if: startsWith(github.ref, 'refs/heads/hotfix/')
    
    permissions:
      contents: write
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔐 Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: 🚨 Create Hotfix Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚨 Creating emergency hotfix release..."
          npm run release:patch -- --preRelease=hotfix

      - name: 🐳 Build Emergency Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:hotfix-latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:hotfix-${{ github.run_number }}
          labels: |
            org.opencontainers.image.title=Jurassic World API (Hotfix)
            org.opencontainers.image.description=Emergency hotfix for critical issues
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  notify-emergency:
    name: 🚨 Emergency Notification
    runs-on: ubuntu-latest
    needs: hotfix-release
    if: always()
    
    steps:
      - name: 🚨 Critical Success Notification
        if: needs.hotfix-release.result == 'success'
        run: |
          echo "🚨 EMERGENCY HOTFIX DEPLOYED SUCCESSFULLY! 🚨"
          echo "🔥 Critical issue has been resolved"
          echo "🐳 Emergency Docker image available"
          echo "⚡ Immediate deployment recommended"

      - name: ❌ Critical Failure Notification
        if: needs.hotfix-release.result == 'failure'
        run: |
          echo "🚨 EMERGENCY HOTFIX FAILED! 🚨"
          echo "❌ Critical deployment unsuccessful"
          echo "🆘 Manual intervention required immediately"
          exit 1
