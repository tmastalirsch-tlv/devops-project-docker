name: 🚀 Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease

jobs:
  release:
    name: 🚀 Create Release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run tests
        run: npm test

      - name: 🏗️ Build application
        run: npm run build

      - name: 🔐 Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: 🚀 Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            npm run release:${{ github.event.inputs.release_type }}
          else
            npm run release:patch
          fi

  docker-release:
    name: 🐳 Build & Push Release Docker Image
    runs-on: ubuntu-latest
    needs: release
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Get latest tag
        id: get_tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.get_tag.outputs.tag }}
            ghcr.io/${{ github.repository }}:${{ steps.get_tag.outputs.version }}
          labels: |
            org.opencontainers.image.title=Jurassic World API
            org.opencontainers.image.description=A comprehensive REST API for managing Jurassic World park operations
            org.opencontainers.image.version=${{ steps.get_tag.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🧪 Test released Docker image
        run: |
          docker run --rm -d --name jurassic-release-test -p 3000:3000 ghcr.io/${{ github.repository }}:latest
          sleep 15
          curl -f http://localhost:3000/health || exit 1
          curl -f http://localhost:3000/ | grep "Jurassic World API" || exit 1
          docker stop jurassic-release-test

  notify:
    name: 📢 Notify Release
    runs-on: ubuntu-latest
    needs: [release, docker-release]
    if: always()
    
    steps:
      - name: 🎉 Success Notification
        if: needs.release.result == 'success' && needs.docker-release.result == 'success'
        run: |
          echo "🎉 Jurassic World API has been successfully released!"
          echo "✅ New version tagged and released"
          echo "🐳 Docker image built and pushed"
          echo "🚀 Ready for deployment"

      - name: ❌ Failure Notification
        if: needs.release.result == 'failure' || needs.docker-release.result == 'failure'
        run: |
          echo "❌ Release failed!"
          echo "🔍 Please check the workflow logs for details"
          exit 1
